<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Admin Login</h1>

    <input id="user" placeholder="Gebruikersnaam">
    <input id="pass" type="password" placeholder="Wachtwoord">
    <button class="btn" onclick="login()">Inloggen</button>

    <p id="msg"></p>

    <script>
        function login() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;

            // EXTREEM STERK WACHTWOORD
            const superWachtwoord = "X9!pA7#qT2vL@8rZ$wF4mN%kH6sB*3dJ0yR";

            if (u === "admin" && p === superWachtwoord) {
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("msg").textContent = "Fout wachtwoord";
            }
        }
    </script>
</body>
</html>
